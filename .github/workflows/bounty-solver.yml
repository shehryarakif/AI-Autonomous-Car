name: Bounty Solver

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      repo:
        description: 'Target repository (owner/repo)'
        required: false
      issue_number:
        description: 'Specific issue number to solve'
        required: false

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  scan-and-solve:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Run bounty scanner
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}  # Optional for AI solving
        run: python scripts/bounty_scanner.py

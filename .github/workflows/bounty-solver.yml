name: Bounty Solver

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  solve-bounty:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install PyGithub google-generativeai

      - name: Run bounty solver
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_FOR_BOUNTY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TARGET_REPOS: "owner/repo1,owner/repo2"   # CHANGE THIS
          LABELS: "bounty"
          DRY_RUN: "true"
        run: python scripts/bounty_solver.py
